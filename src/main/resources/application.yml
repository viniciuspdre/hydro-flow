app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000

spring:
  application:
    name: hydro-flow
    version: 0.0.1-SNAPSHOT
    formatted-version: " (v${spring.application.version})"

  datasource:
    driver-class-name: ${HYDRO_FLOW_DB_DRIVER:org.postgresql.Driver}
    url: ${HYDRO_FLOW_DB_URL:jdbc:postgresql://localhost:5433/hf_management}
    username: ${HYDRO_FLOW_DB_USER:admin}
    password: ${HYDRO_FLOW_DB_PWD:J65hH#0hEK}
    hikari:
      pool-name: HydroFlowPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    parameters:
      ADMIN_EMAIL: ${ADMIN_EMAIL:admin}
      #ADMIN_PASSWORD: ${ADMIN_PASSWORD:admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:$2a$10$u0Kk6GdB0zT6vn.He1j9OOjmjpkZ5k.w5sIuts/GYEyWnQIwidlGC}

logging:
  level:
    root: INFO
    br.com.project.hydroflow: DEBUG
#    liquibase: DEBUG
#    org.springframework.boot.autoconfigure.liquibase: DEBUG
  file:
    name: /app/logs/hydro-flow.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      file-name-pattern: /app/logs/hydro-flow-%d{yyyy-MM-dd}.%i.log