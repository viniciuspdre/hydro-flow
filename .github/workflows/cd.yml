name: Hydro Flow CD

on:
  workflow_run:
    workflows: ["Hydro Flow CI"]
    branches: [ "master" ]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build e Push da Imagem para o ACR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Configurar Cache do Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Dar permissão de execução ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Login na Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login no Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build e Push da imagem com Jib
        run: |
          ./gradlew jib \
            -Djib.to.image=${{ env.ACR_LOGIN_SERVER }}/hydro-flow \
            -Djib.to.tags="${{ github.sha }},latest"
