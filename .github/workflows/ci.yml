name: Hydro Flow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    # Configuração do banco de dados para os testes de integração do Spring Boot
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: hf_management
        # Mapeando a porta 5433 do host para a 5432 do container, igual ao docker-compose.yml
        ports:
          - 5433:5432
        # Aguarda o banco estar pronto antes de prosseguir
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          # Utilizando a distribuição Oracle ou Zulu, que costumam suportar as versões mais recentes do Java rapidamente
          distribution: 'oracle' 

      - name: Configurar Cache do Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Dar permissão de execução ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Verificar formatação do código (Spotless)
        run: ./gradlew spotlessCheck
        
      - name: Executar testes e compilar o projeto
        # A task 'build' do Gradle automaticamente executa a task 'test' e o 'jacocoTestReport'
        run: ./gradlew build

      - name: Disponibilizar Relatório de Testes (Opcional)
        uses: actions/upload-artifact@v4
        if: always() # Garante que o relatório seja salvo mesmo se os testes falharem
        with:
          name: relatorio-de-testes
          path: build/reports/tests/test/
          
      - name: Disponibilizar Relatório de Cobertura Jacoco (Opcional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-cobertura-jacoco
          path: build/reports/jacoco/test/html/